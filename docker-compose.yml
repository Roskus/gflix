# sudo docker compose up -d
services:
    php:
        build: .
        container_name: php
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./etc/.bashrc:/root/.bashrc
            - ./etc/ssl/certs:/etc/ssl/certs
            - ./etc/ssl/private:/etc/ssl/private
            - ./storage/app/public:/var/www/gflix/storage/app/public
            - .:/var/www/gflix
